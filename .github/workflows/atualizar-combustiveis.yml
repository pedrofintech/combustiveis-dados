# Colocar em .github/workflows/atualizar-combustiveis.yml
name: Atualizar combustíveis

on:
  schedule:
    # De hora a hora entre as 7h e as 21h de Lisboa (6-20 UTC). Assim a página
    # apanha a previsão de sexta-feira ~1h depois de a fonte publicar, em vez
    # de esperar pelo dia seguinte. É barato: só faz commit quando os dados
    # mudam; os runs sem novidade terminam em segundos. Se o GitHub atrasar ou
    # saltar um run (limitação conhecida do cron), o da hora seguinte apanha.
    - cron: '0 6-20 * * *'
  workflow_dispatch:       # permite correr manualmente no separador Actions

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Atualizar dados
        run: node update-combustiveis.mjs

      - name: Commit e push (só se houver alterações)
        run: |
          git config user.name "combustiveis-bot"
          git config user.email "bot@users.noreply.github.com"
          git add combustiveis.json
          git diff --cached --quiet || git commit -m "Atualiza dados dos combustiveis [skip ci]"
          git push
