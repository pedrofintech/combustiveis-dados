# Colocar em .github/workflows/atualizar-combustiveis.yml
name: Atualizar combustíveis

on:
  schedule:
    # Todos os dias às ~14h de Lisboa (13h UTC). Correr diariamente torna o
    # sistema fiável: se o GitHub atrasar ou saltar um dia (limitação conhecida
    # do cron do Actions), o dia seguinte apanha. Só faz commit quando os dados
    # mudam de facto, por isso correr todos os dias é barato.
    - cron: '0 13 * * *'
  workflow_dispatch:       # permite correr manualmente no separador Actions

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Atualizar dados
        run: node update-combustiveis.mjs

      - name: Commit e push (só se houver alterações)
        run: |
          git config user.name "combustiveis-bot"
          git config user.email "bot@users.noreply.github.com"
          git add combustiveis.json
          git diff --cached --quiet || git commit -m "Atualiza dados dos combustiveis [skip ci]"
          git push
