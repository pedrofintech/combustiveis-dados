name: Atualizar combustíveis

on:
  schedule:
    - cron: '0 13 * * 5'  # 6ª feira ~14h de Lisboa: previsão da semana seguinte
    - cron: '0 13 * * 1'  # 2ª feira ~14h de Lisboa: confirmação dos preços reais
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Atualizar dados
        run: node update-combustiveis.mjs

      - name: Commit e push (só se houver alterações)
        run: |
          git config user.name "combustiveis-bot"
          git config user.email "bot@users.noreply.github.com"
          git add combustiveis.json
          git diff --cached --quiet || git commit -m "Atualiza dados dos combustiveis"
          git push
